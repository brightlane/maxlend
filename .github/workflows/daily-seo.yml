name: Daily SEO Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python index-ping.py
      - name: Commit changes
        run: |
          git config --global user.name 'SEO-Bot'
          git config --global user.email 'bot@brightlane.io'
          git add .
          git commit -m "Auto-update $(date)" || echo "No changes"
          git push
